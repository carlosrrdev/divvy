<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description"
        content="Divvy is an expense splitting web application that helps you quickly delegate expenses between groups of people.">
  <link rel="shortcut icon" href="/divvy.svg" type="image/x-icon">
  <title>Divvy | Expense splitting</title>
</head>
<body class="dark: bg-slate-950 text-indigo-200">
<div class="divvy-grid">
  <header class="divvy-header">
    <nav class="divvy-container">
      <div class="flex items-center">
        <img class="w-8" src="/divvy.svg" alt="logo">
        <p class="font-bold text-xl">Divvy</p>
      </div>
    </nav>
  </header>
  <main class="divvy-container">
    <div class="divvy-steps-container">
      <div id="divvy-steps" class="flex justify-between">
        <div class="flex flex-col">
          <p class="text-lg font-bold" id="divvy-current-step">Step 1. Add users</p>
          <small class="dark:text-indigo-400">Start by adding participating members</small>
        </div>
        <div>
          <button>Next step</button>
        </div>
      </div>
      <section id="step_1">
        <div class="divvy-step">
          <!-- Step content goes here -->

        </div>
      </section>
    </div>
  </main>
  <footer class="divvy-footer">
    <div class="divvy-container flex flex-col items-center">
      <small>Made with <span class="text-teal-400">&hearts;</span> by Carlos Rodriguez</small>
      <small>&copy; 2023-2024. All rights reserved</small>
      <a class="text-sm underline" href="https://github.com/carlosrrdev/divvy" target="_blank" rel="noreferrer">View
        source code</a>
    </div>
  </footer>
</div>
<noscript>This site requires Javascript to properly function. Please enable Javascript and refresh the page.</noscript>
<script type="module" src="/app.js"></script>
</body>
</html>
