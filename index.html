<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description"
        content="Divvy is an expense splitting web application that helps you quickly delegate expenses between groups of people.">
  <link rel="shortcut icon" href="/divvy.svg" type="image/x-icon">
  <title>Divvy | Expense splitting</title>
</head>
<body class="page-body">
<div class="page-grid">
  <header class="header">
    <div class="container py-4 flex justify-between items-center">
      <div class="flex items-center">
        <p class="font-heading text-xl">Divvy</p>
      </div>
      <div>
        <button aria-label="Toggle menu">
          <svg role="img" aria-label="Mobile menu" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6"
               viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="container py-2">
      <div class="flex flex-col gap-y-12">
        <section class="flex items-center justify-between">
          <div>
            <p class="text-xl font-bold" id="date-week"></p>
            <p id="date-full"></p>
          </div>
          <button id="mobile-create-btn" aria-label="Create divvy"
                  class="ml-auto bg-indigo-600 rounded-sm p-2 flex items-center gap-x-2">
            <span>Create</span>
            <svg role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24">
              <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 20h4L18.5 9.5a2.828 2.828 0 1 0-4-4L4 16zm9.5-13.5l4 4M16 19h6m-3-3v6"/>
            </svg>
          </button>
        </section>
        <section>
          <div class="flex justify-between items-center">
            <p class="font-[300]">Your previous divvy's</p>
            <button aria-label="Filter options">
              <svg role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24">
                <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 10a2 2 0 1 0 4 0a2 2 0 0 0-4 0m2-6v4m0 4v8m4-4a2 2 0 1 0 4 0a2 2 0 0 0-4 0m2-12v10m0 4v2m4-13a2 2 0 1 0 4 0a2 2 0 0 0-4 0m2-3v1m0 4v11"/>
              </svg>
            </button>
          </div>
        </section>
      </div>
    </div>
    <div class="bg-background-light min-h-full text-text-light">
      <div id="prev-divvy-container" class="container min-h-full flex justify-center items-center">
        <div id="empty-divvy" class="flex flex-col items-center text-slate-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="m8 20l6-6l3-3l1.5-1.5a2.828 2.828 0 1 0-4-4L4 16v4zm5.5-13.5l4 4M19 22v.01M19 19a2.003 2.003 0 0 0 .914-3.782a1.98 1.98 0 0 0-2.414.483"/>
          </svg>
          <p class="text-center">No divvies found! <br>Try creating a new one!</p>
        </div>
      </div>
    </div>
  </main>
</div>
<footer class="footer p-6">
  <div class="container text-sm flex flex-col gap-y-6">
    <div class="border-b pb-6 border-slate-600">
      <p class="font-heading text-3xl">Divvy</p>
      <p class="text-lg text-slate-500">Expense tracking and splitting</p>
    </div>
    <div class="flex gap-x-2 items-center">
      <a href="https://github.com/carlosrrdev" title="github">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24">
          <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2c2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2a4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 0 0-6.2 0C6.5 2.8 5.4 3.1 5.4 3.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 4 9.5c0 4.6 2.7 5.7 5.5 6c-.6.6-.6 1.2-.5 2V21"/>
        </svg>
      </a>
      <a href="">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24">
          <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
            <path d="M8 12a1 1 0 1 0 2 0a1 1 0 0 0-2 0m6 0a1 1 0 1 0 2 0a1 1 0 0 0-2 0"/>
            <path
              d="M15.5 17c0 1 1.5 3 2 3c1.5 0 2.833-1.667 3.5-3c.667-1.667.5-5.833-1.5-11.5c-1.457-1.015-3-1.34-4.5-1.5l-.972 1.923a11.913 11.913 0 0 0-4.053 0L9 4c-1.5.16-3.043.485-4.5 1.5c-2 5.667-2.167 9.833-1.5 11.5c.667 1.333 2 3 3.5 3c.5 0 2-2 2-3"/>
            <path d="M7 16.5c3.5 1 6.5 1 10 0"/>
          </g>
        </svg>
      </a>
      <a href="mailto:rr.carlos.dev@gmail.com">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24">
          <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
            <path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <path d="m3 7l9 6l9-6"/>
          </g>
        </svg>
      </a>
    </div>
    <div>
      <p>Made with <span class="text-rose-500"> &hearts;</span> by Carlos Rodriguez</p>
      <a class="text-indigo-400" href="https://github.com/carlosrrdev/divvy" target="_blank" rel="noreferrer">
        View source code
      </a>
    </div>
    <p>Copyright &copy; 2024</p>
  </div>
</footer>
<dialog id="mobile-steps-dialog" class="bg-transparent h-full w-full">
  <div class="bg-secondary-dark text-text-dark h-full w-full p-4">
    <button aria-label="Cloe dialog" id="close-dialog-btn">
      <svg role="img" aria-label="Close" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24">
        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div>creating new divvy</div>
  </div>
</dialog>
<noscript>This site requires Javascript to properly function. Please enable Javascript and refresh the page.</noscript>
<script type="module" src="/app.js"></script>
</body>
</html>
